name: Publish to Marketplace

# Manual trigger only. Publishing is a deliberate action, not automatic.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (must match package.json). Leave blank to use the version already in package.json.'
        required: false
        default: ''

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Bump version (if specified)
        if: ${{ inputs.version != '' }}
        run: |
          npm version ${{ inputs.version }} --no-git-tag-version
        env:
          GIT_AUTHOR_NAME: github-actions
          GIT_AUTHOR_EMAIL: github-actions@github.com
          GIT_COMMITTER_NAME: github-actions
          GIT_COMMITTER_EMAIL: github-actions@github.com

      - name: Build extension
        run: npm run build

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --pat "$VSCE_PAT" --no-git-tag-version
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
